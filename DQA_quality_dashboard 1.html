<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily QA Analysis Dashboard</title>
    <!-- React and ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-200">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        // --- CSV Parsing Utility ---
        const parseCSV = (text) => {
            const lines = text.split('\n');
            // Find header row based on known column names in the new sheet
            let headerIndex = lines.findIndex(line => line.includes('Full Name - Flag User') || line.includes('Alert Created Time'));
            if (headerIndex === -1) headerIndex = 0; 
            
            const headers = lines[headerIndex].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const data = [];
            
            for (let i = headerIndex + 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const row = [];
                let inQuotes = false;
                let currentValue = '';
                for (let char of line) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(currentValue);
                        currentValue = '';
                    } else {
                        currentValue += char;
                    }
                }
                row.push(currentValue);
                
                if (row.length > 5) {
                    let obj = {};
                    headers.forEach((h, index) => {
                        obj[h] = row[index] ? row[index].replace(/^"|"$/g, '').trim() : '';
                    });
                    
                    // Filter out "Not An Error" and purely empty rows
                    const broadCat = obj['Caption Broad Cats'];
                    if (broadCat && broadCat !== 'Not An Error' && broadCat !== '#N/A' && broadCat.trim() !== '') {
                        data.push(obj);
                    }
                }
            }
            return data;
        };

        // --- Custom SVG Icons ---
        const Icons = {
            Upload: () => <svg className="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Activity: () => <svg className="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" /></svg>,
            AlertTriangle: () => <svg className="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            AlertOctagon: () => <svg className="w-5 h-5 text-red-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            BarChart: () => <svg className="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" /></svg>,
            FileWarning: () => <svg className="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Users: () => <svg className="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>,
            Clock: () => <svg className="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            FileText: () => <svg className="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            Lightbulb: () => <svg className="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
        };

        // --- Training Suggestion Logic ---
        const getTrainingSuggestion = (detailedCat) => {
            if (!detailedCat) return "General Quality Review: Review all recent errors and guidelines.";
            const lowerCat = detailedCat.toLowerCase();
            if (lowerCat.includes('missing info')) {
                return "Attention to Detail: Coach on capturing all key facts before drafting (e.g., arrests, injuries vs deaths, specific geo locations).";
            } else if (lowerCat.includes('grammar') || lowerCat.includes('sentence structure') || lowerCat.includes('word/phrase usage')) {
                return "Linguistic Coaching: Focus on subject-verb agreement, pluralization rules, and logical timeline phrasing (e.g., using 'as' vs 'after').";
            } else if (lowerCat.includes('spelling') || lowerCat.includes('punctuation')) {
                return "Proofreading Check: Encourage a 10-second review of the draft before submitting to catch typos.";
            } else if (lowerCat.includes('location')) {
                return "Geo Guidelines: Re-train on specific location formatting requirements (e.g., City, State/Province, Country).";
            } else if (lowerCat.includes('incorrect info')) {
                return "Reading Comprehension: Coach on verifying facts directly from the source text to prevent severity inflations.";
            } else if (lowerCat.includes('name format')) {
                return "Naming Conventions: Review the guidelines for formatting people, company, and organization names correctly.";
            }
            return "Refresher Training: Schedule a quick 1-on-1 to review the most recent error logs and reinforce general quality standards.";
        };

        // --- Main App Component ---
        function DashboardApp() {
            const [data, setData] = useState(null);
            const [fileName, setFileName] = useState('');
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = useRef(null);

            const handleFileUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    setFileName(file.name);
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        setData(parseCSV(evt.target.result));
                    };
                    reader.readAsText(file);
                }
            };

            const stats = useMemo(() => {
                if (!data) return null;

                const broadCats = {};
                const detailedCats = {};
                const aaStats = {};
                const shiftStats = {};
                
                let majorCriticalCount = 0;
                let minorCount = 0;

                data.forEach(row => {
                    // Category Trackers
                    const broad = row['Caption Broad Cats'];
                    if (broad) broadCats[broad] = (broadCats[broad] || 0) + 1;

                    const detailed = row['Caption Detailed Cats'];
                    if (detailed && detailed !== 'Not An Error' && detailed !== 'Draft Caption Not Available') {
                        detailedCats[detailed] = (detailedCats[detailed] || 0) + 1;
                    }

                    // Criticality Tracker
                    const crit = row['Caption Criticality'];
                    if (crit === 'Major' || crit === 'Critical') majorCriticalCount++;
                    if (crit === 'Minor') minorCount++;

                    // Shift Tracker
                    const shift = row['Shift'];
                    if (shift) shiftStats[shift] = (shiftStats[shift] || 0) + 1;

                    // Analyst Tracker
                    const aaName = row['Full Name - Flag User'];
                    if (aaName) {
                        // FIX: Ensure subTypes object is initialized so Object.entries doesn't fail
                        if (!aaStats[aaName]) aaStats[aaName] = { total: 0, criticals: 0, subTypes: {} };
                        aaStats[aaName].total += 1;
                        if (crit === 'Major' || crit === 'Critical') {
                            aaStats[aaName].criticals += 1;
                        }
                        
                        // Populate subTypes for Training Insights
                        if (detailed && detailed !== 'Not An Error' && detailed !== 'Draft Caption Not Available') {
                            aaStats[aaName].subTypes[detailed] = (aaStats[aaName].subTypes[detailed] || 0) + 1;
                        }
                    }
                });

                const topDetailed = Object.entries(detailedCats).sort((a, b) => b[1] - a[1]).slice(0, 8);
                const topBroad = Object.entries(broadCats).sort((a, b) => b[1] - a[1]).slice(0, 5);
                const topAAs = Object.entries(aaStats).sort((a, b) => b[1].total - a[1].total).slice(0, 7);
                const shiftArray = Object.entries(shiftStats).sort((a, b) => b[1] - a[1]);

                const trainingInsights = Object.entries(aaStats).map(([name, stats]) => {
                    const topError = Object.entries(stats.subTypes).sort((a, b) => b[1] - a[1])[0];
                    const topErrorName = topError ? topError[0] : 'N/A';
                    const topErrorCount = topError ? topError[1] : 0;
                    return {
                        name,
                        total: stats.total,
                        topErrorName,
                        topErrorCount,
                        suggestion: getTrainingSuggestion(topErrorName)
                    };
                }).filter(aa => aa.topErrorCount > 1).sort((a, b) => b.total - a.total).slice(0, 6);

                return {
                    totalErrors: data.length, 
                    topDetailed, 
                    topBroad, 
                    topAAs, 
                    shiftArray,
                    majorCriticalCount,
                    minorCount,
                    trainingInsights
                };
            }, [data]);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Icons.Activity />
                                <h1 className="text-xl font-bold text-slate-900">Daily QA Analysis Dashboard</h1>
                            </div>
                            {data && (
                                <div className="flex items-center gap-4 text-sm">
                                    <span className="text-slate-500 truncate max-w-[200px] font-medium">{fileName}</span>
                                    <button onClick={() => setData(null)} className="px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-md font-semibold transition-colors">
                                        Upload New QA Data
                                    </button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">
                        {!data ? (
                            <div className={`max-w-2xl mx-auto mt-20 border-2 border-dashed rounded-xl p-12 text-center transition-all ${isDragging ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 bg-white'}`}
                                 onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                 onDragLeave={() => setIsDragging(false)}
                                 onDrop={(e) => { e.preventDefault(); setIsDragging(false); const file = e.dataTransfer.files?.[0]; if (file) { setFileName(file.name); const r = new FileReader(); r.onload = (x) => setData(parseCSV(x.target.result)); r.readAsText(file); } }}>
                                <div className="mx-auto w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mb-6">
                                    <Icons.Upload />
                                </div>
                                <h2 className="text-2xl font-semibold text-slate-800 mb-2">Upload QA Analysis File</h2>
                                <p className="text-slate-500 mb-8">Drag and drop your extracted Daily QA .csv file here</p>
                                <input type="file" accept=".csv" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
                                <button onClick={() => fileInputRef.current?.click()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-medium shadow-sm transition-colors">
                                    Select QA CSV
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {/* KPIs */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex justify-between items-start">
                                        <div><p className="text-sm font-medium text-slate-500">Total QA Errors Found</p><p className="text-3xl font-bold text-slate-900 mt-1">{stats.totalErrors}</p></div>
                                        <div className="p-2 bg-indigo-50 rounded-lg"><Icons.AlertTriangle /></div>
                                    </div>
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex justify-between items-start">
                                        <div><p className="text-sm font-medium text-slate-500">Major / Critical Errors</p><p className="text-3xl font-bold text-red-600 mt-1">{stats.majorCriticalCount}</p></div>
                                        <div className="p-2 bg-red-50 rounded-lg"><Icons.AlertOctagon /></div>
                                    </div>
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex justify-between items-start">
                                        <div><p className="text-sm font-medium text-slate-500">Primary Broad Category</p><p className="text-lg font-bold text-slate-900 mt-2 leading-tight">{stats.topBroad[0]?.[0] || 'N/A'}</p></div>
                                        <div className="p-2 bg-purple-50 rounded-lg"><Icons.BarChart /></div>
                                    </div>
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex justify-between items-start">
                                        <div><p className="text-sm font-medium text-slate-500">Primary Detailed Category</p><p className="text-lg font-bold text-slate-900 mt-2 leading-tight">{stats.topDetailed[0]?.[0] || 'N/A'}</p></div>
                                        <div className="p-2 bg-amber-50 rounded-lg"><Icons.FileWarning /></div>
                                    </div>
                                </div>

                                {/* Charts & Patterns Row */}
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {/* Detailed Categories Chart */}
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                        <h3 className="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2"><Icons.BarChart /> Top Detailed Error Categories</h3>
                                        <div className="space-y-4">
                                            {stats.topDetailed.map(([name, count], index) => {
                                                const pct = Math.max(5, (count / stats.topDetailed[0][1]) * 100);
                                                return (
                                                    <div key={index}>
                                                        <div className="flex justify-between text-sm mb-1">
                                                            <span className="font-medium text-slate-700 truncate pr-4">{name}</span>
                                                            <span className="text-slate-500 font-mono font-bold">{count}</span>
                                                        </div>
                                                        <div className="w-full bg-slate-100 rounded-full h-2">
                                                            <div className="bg-indigo-500 h-2 rounded-full" style={{ width: `${pct}%` }} />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Shift & Criticality Analysis */}
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col gap-6">
                                        
                                        <div>
                                            <h3 className="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2"><Icons.Clock /> Errors by Shift</h3>
                                            <div className="flex gap-4">
                                                {stats.shiftArray.map(([shift, count], idx) => (
                                                    <div key={idx} className="flex-1 bg-slate-50 border border-slate-100 rounded-lg p-4 text-center">
                                                        <p className="text-sm font-medium text-slate-500 mb-1">Shift {shift || 'Unassigned'}</p>
                                                        <p className="text-2xl font-bold text-slate-800">{count}</p>
                                                    </div>
                                                ))}
                                                {stats.shiftArray.length === 0 && <p className="text-sm text-slate-500 italic">No shift data available.</p>}
                                            </div>
                                        </div>

                                        <div>
                                            <h3 className="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2"><Icons.AlertTriangle /> Severity Breakdown</h3>
                                            <div className="w-full h-4 rounded-full flex overflow-hidden mb-2">
                                                <div className="bg-amber-400 h-full" style={{ width: `${(stats.minorCount / stats.totalErrors) * 100}%` }}></div>
                                                <div className="bg-red-500 h-full" style={{ width: `${(stats.majorCriticalCount / stats.totalErrors) * 100}%` }}></div>
                                            </div>
                                            <div className="flex justify-between text-sm">
                                                <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-amber-400"></div> <span className="text-slate-600 font-medium">{stats.minorCount} Minor</span></div>
                                                <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-red-500"></div> <span className="text-red-700 font-bold">{stats.majorCriticalCount} Major/Critical</span></div>
                                            </div>
                                        </div>

                                    </div>
                                </div>

                                {/* Analyst Tracking Row */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 lg:col-span-1">
                                        <h3 className="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2"><Icons.Users /> Highest Error Volume</h3>
                                        <div className="flex flex-col gap-4">
                                            {stats.topAAs.map(([name, aaStat], index) => {
                                                const pct = Math.max(5, (aaStat.total / stats.topAAs[0][1].total) * 100);
                                                return (
                                                    <div key={index} className="flex flex-col gap-1">
                                                        <div className="flex justify-between text-sm">
                                                            <span className="font-medium text-slate-700 flex items-center gap-2">
                                                                {name} 
                                                                {aaStat.criticals > 0 && <span className="px-1.5 py-0.5 bg-red-100 text-red-700 rounded text-[10px] font-bold" title="Has Major/Critical Errors">{aaStat.criticals} Crit.</span>}
                                                            </span>
                                                            <span className="text-slate-500 font-mono font-bold">{aaStat.total} err</span>
                                                        </div>
                                                        <div className="w-full bg-slate-100 rounded-full h-2"><div className="bg-slate-700 h-2 rounded-full" style={{ width: `${pct}%` }} /></div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 lg:col-span-2">
                                        <h3 className="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2"><Icons.Lightbulb /> Targeted Coaching & Training Needs</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {stats.trainingInsights.map((aa, idx) => (
                                                <div key={idx} className="p-4 border border-slate-100 rounded-lg bg-slate-50 flex flex-col gap-2 shadow-sm">
                                                    <div className="flex justify-between items-start">
                                                        <p className="font-bold text-sm text-slate-800">{aa.name}</p>
                                                        <span className="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded text-[10px] font-bold whitespace-nowrap">{aa.topErrorCount} repeated errors</span>
                                                    </div>
                                                    <p className="text-xs text-rose-600 font-semibold">{aa.topErrorName}</p>
                                                    <div className="text-xs text-slate-600 bg-white p-3 rounded border border-slate-200 mt-auto leading-relaxed">
                                                        <span className="font-semibold text-slate-700 block mb-1">Suggested Coaching Plan:</span>
                                                        {aa.suggestion}
                                                    </div>
                                                </div>
                                            ))}
                                            {stats.trainingInsights.length === 0 && <p className="text-sm text-slate-500 italic col-span-2">No repeated error patterns found for specific analysts.</p>}
                                        </div>
                                    </div>
                                </div>

                                {/* Data Log Table */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                        <h3 className="font-semibold text-slate-800 flex items-center gap-2"><Icons.FileText /> QA Error Log Preview (Top 100 Errors)</h3>
                                    </div>
                                    <div className="overflow-x-auto max-h-96 overflow-y-auto">
                                        <table className="w-full text-left border-collapse text-sm">
                                            <thead className="bg-white sticky top-0 border-b border-slate-200 shadow-sm z-10">
                                                <tr>
                                                    <th className="p-4 font-semibold text-slate-500 w-1/4">Analyst & Severity</th>
                                                    <th className="p-4 font-semibold text-slate-500 w-1/3">Error Categories</th>
                                                    <th className="p-4 font-semibold text-slate-500 w-1/3">Caption & Observations</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {data.slice(0, 100).map((row, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50/80 transition-colors">
                                                        <td className="p-4 align-top">
                                                            <p className="font-bold text-slate-800 mb-1">{row['Full Name - Flag User'] || 'Unknown'}</p>
                                                            {row['Caption Criticality'] === 'Major' || row['Caption Criticality'] === 'Critical' ? (
                                                                <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-red-100 text-red-700 mb-1">{row['Caption Criticality']}</span>
                                                            ) : (
                                                                <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-amber-50 text-amber-700 mb-1">{row['Caption Criticality'] || 'Minor'}</span>
                                                            )}
                                                            <p className="text-slate-400 text-xs mt-1">Auditor: {row['Reviewer Name']}</p>
                                                        </td>
                                                        <td className="p-4 align-top">
                                                            <p className="font-semibold text-slate-700 text-xs mb-1 bg-slate-100 inline-block px-2 py-1 rounded">{row['Caption Broad Cats']}</p>
                                                            <p className="text-slate-600 text-xs mt-1">{row['Caption Detailed Cats']}</p>
                                                        </td>
                                                        <td className="p-4 align-top">
                                                            <p className="text-slate-700 text-xs max-w-sm"><span className="font-semibold">Final:</span> {row['Caption'] || '-'}</p>
                                                            {row['Reviewer Comments'] && (
                                                                <p className="text-indigo-700 text-xs mt-2 p-2 bg-indigo-50 rounded border border-indigo-100">
                                                                    <span className="font-semibold">Comment:</span> {row['Reviewer Comments']}
                                                                </p>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardApp />);
    </script>
</body>
</html>
